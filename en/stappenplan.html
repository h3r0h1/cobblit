<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body class="bg-white text-black font-sans selection:bg-black selection:text-white">
    <div class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full space-y-8 text-center animate-fade-in">
            <h1 class="text-[10rem] md:text-[12rem] font-black leading-none tracking-tighter opacity-5 select-none pointer-events-none">
                404
            </h1>
            
            <div class="-mt-20 space-y-4">
                <h2 class="text-4xl font-bold tracking-tight">
                    Pagina niet gevonden
                </h2>
                <p class="text-lg text-gray-500">
                    De pagina die je zoekt is verplaatst of bestaat niet meer. 
                    Je wordt over enkele seconden doorgestuurd naar <span class="font-semibold text-black">cobblit.nl</span>.
                </p>
            </div>

            <div class="pt-8">
                <a 
                    href="https://cobblit.nl"
                    class="inline-flex items-center justify-center px-8 py-4 text-base font-bold text-white bg-black hover:bg-gray-900 transition-all duration-300 rounded-full group"
                >
                    <span>Ga naar Cobblit</span>
                    <svg 
                        class="ml-2 w-5 h-5 group-hover:translate-x-1 transition-transform" 
                        fill="none" 
                        viewBox="0 0 24 24" 
                        stroke="currentColor"
                    >
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" />
                    </svg>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        setTimeout(() => {
            window.location.href = 'https://cobblit.nl';
        }, 3000);
    </script>
</body>
</html>
